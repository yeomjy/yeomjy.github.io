name: "Build and deploy"

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        id: node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install Dependency
        id: install
        run: yarn install --frozen-lockfile

      - name: Build
        id: build
        run: yarn build

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
